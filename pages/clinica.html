<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica</title>
    <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
</head>

<body>
    
    <!-- menu -->
    <header id="header">
        <div class="container-header">
            <!-- logo -->
            <div class="logo">
                <img src="../assets/images/logo-clínica.png" alt="Logo com íniciais 'E' e 'B'(estética Brasileira)">
            </div>

            <nav class="menu-desktop">
                <!-- links desktop -->
                <ul>
                    <li>
                        <a href="../index.html">
                            <i class="fa-solid fa-house"></i>
                            Home
                        </a>
                    </li>

                    <li>
                        <a href="clinica.html">
                            <i class="fa-solid fa-spa"></i>
                            Clínica
                        </a>
                    </li>

                    <li>
                        <a href="servicos.html">
                            <i class="fa-solid fa-sun"></i>
                            Serviços
                        </a>
                    </li>

                    <li>
                        <a href="agendamento.html">
                            <i class="fa-solid fa-calendar-days"></i>
                            Agendamento
                        </a>
                    </li>

                </ul>

            </nav>

            <div class="search-area">

                <div class="search-box">
                    <input type="text" placeholder="Pesquisar">
                    <button>
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
                <!-- bandeiras -->
                <div class="flags">
                    <img src="https://flagcdn.com/w40/br.png">
                    <img src="https://flagcdn.com/w40/rs.png">
                </div>

            </div>

            <!-- hamburguer -->
            <div class="menu-toggle" id="openMenu">
                <i class="fa-solid fa-bars"></i>
            </div>

        </div>

    </header>

    <!-- menu mobile  -->
    <div class="mobile-menu" id="mobileMenu">

        <div class="close-btn" id="closeMenu">
            <i class="fa-solid fa-xmark"></i>
        </div>
        <!-- links menu mobile -->
        <ul>

            <li>
                <a href="../index.html">
                    <i class="fa-solid fa-house"></i>
                    Home
                </a>
            </li>

            <li>
                <a href="clinica.html">
                    <i class="fa-solid fa-spa"></i>
                    Clínica
                </a>
            </li>

            <li>
                <a href="servicos.html">
                    <i class="fa-solid fa-sun"></i>
                    Serviços
                </a>
            </li>

            <li>
                <a href="agendamento.html">
                    <i class="fa-solid fa-calendar-days"></i>
                    Agendamento
                </a>
            </li>


        </ul>
        <div class="flags-mobile">

            <img src="https://flagcdn.com/w40/br.png" alt="Português">
            <img src="https://flagcdn.com/w40/rs.png" alt="Srpski">

        </div>

    </div>

    
</body>
</html>
